name: Backend Deploy

on:
  workflow_dispatch:

concurrency:
  group: backend-deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/adjusta-backend:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build backend image
        run: docker build --file backend/Dockerfile --tag "${IMAGE}" backend

      - name: Push backend image
        run: docker push "${IMAGE}"

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Atlas
        uses: ariga/setup-atlas@v0
        with:
          version: v1.2.0

      - name: Apply database migrations
        env:
          DATABASE_URL_SECRET: ${{ vars.DATABASE_URL_SECRET }}
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret="${DATABASE_URL_SECRET}")"
          atlas migrate apply \
            --dir "file://backend/migrations" \
            --url "${DATABASE_URL}" \
            --revisions-schema "public"

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --service-account=${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
            --min-instances=0
          env_vars: |-
            GO_ENV=production
            CORS_ALLOW_ORIGINS=${{ vars.CORS_ALLOW_ORIGINS }}
            DOMAIN=${{ vars.COOKIE_DOMAIN }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            GOOGLE_REDIRECT_URI=${{ vars.GOOGLE_REDIRECT_URI }}
            REDIRECT_URL_AFTER_LOGIN=${{ vars.REDIRECT_URL_AFTER_LOGIN }}
          secrets: |-
            DATABASE_URL=${{ vars.DATABASE_URL_SECRET }}:latest
            SESSION_SECRET=${{ vars.SESSION_SECRET_SECRET }}:latest
            GOOGLE_CLIENT_SECRET=${{ vars.GOOGLE_CLIENT_SECRET_SECRET }}:latest
