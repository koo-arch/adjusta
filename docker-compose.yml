x-db-env: &db-env
  DATABASE_URL: "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"

services:
  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/backend
      - ./backend/config/service-account.json:/backend/config/service-account.json:ro
    environment:
      <<: *db-env
      GOOGLE_APPLICATION_CREDENTIALS: "/backend/config/service-account.json"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  migrate:
    image: arigaio/atlas:1.2.0
    command:
      - migrate
      - apply
      - --dir
      - file:///migrations
      - --url
      - postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
    profiles: ["tools"]
    volumes:
      - ./backend/migrations:/migrations:ro
    environment:
      <<: *db-env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend
    networks:
      - app-network
  db:
    image: "postgres:18-bookworm"
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
      TZ: "${DB_TZ}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
